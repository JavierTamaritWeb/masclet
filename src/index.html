<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Masclet Bot Fallero</title>
  <meta name="description" content="Masclet Bot Fallero: tu chatbot interactivo sobre las Fallas de Valencia. Pregunta sobre cultura, gastronomía, vestimenta y tradiciones falleras." />

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- CSS compilado desde SCSS -->
  <link rel="stylesheet" href="css/main.min.css" />

  <!-- Dependencias JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js" defer></script>
  <script src="https://unpkg.com/compromise" defer></script>
</head>

<body>

  <!-- ========== ENCABEZADO ========== -->
  <header class="page-header">
    <h1 class="page-header__title">🎆 Masclet Bot Fallero</h1>
    <p class="page-header__subtitle">¡Hola! Soy Masclet, el bot fallero. Pregúntame lo que quieras.</p>
  </header>

  <!-- ========== CONTENEDOR PRINCIPAL ========== -->
  <main class="chat-wrapper">

    <!-- ========== WIDGET CHATBOT ========== -->
    <section class="chatbot" aria-label="Chat con Masclet Bot" role="complementary">

      <!-- Cabecera (arrastrable) -->
      <div class="chatbot__header" role="banner">
        <img class="chatbot__avatar" src="img/masclet.png" alt="Masclet Bot avatar" />
        <span class="chatbot__title">Masclet Bot</span>
        <button class="chatbot__toggle"
                type="button"
                aria-label="Minimizar chat"
                aria-expanded="true">_</button>
      </div>

      <!-- Área de mensajes -->
      <div class="chatbot__body"
           role="log"
           aria-live="polite"
           aria-label="Mensajes del chat">
        <!-- Los mensajes se insertan dinámicamente -->
      </div>

      <!-- Sugerencias -->
      <div class="suggestions" aria-label="Sugerencias">
        <!-- Botones de sugerencia dinámicos -->
      </div>

      <!-- Área de entrada -->
      <div class="input-area">
        <label for="chat-input" class="sr-only">Escribe tu pregunta</label>
        <input class="input-area__field"
               id="chat-input"
               placeholder="Escribe tu pregunta..."
               type="text"
               autocomplete="off" />
        <button class="input-area__send" type="button">Enviar</button>
        <button class="input-area__reset"
                type="button"
                title="Reiniciar conversación"
                aria-label="Reiniciar conversación">
          <svg fill="#ffffff" height="25" width="25" viewBox="-192 -192 2304 2304"
               xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <path d="M960 0v112.941c467.125 0 847.059 379.934 847.059 847.059 0 467.125-379.934 847.059-847.059 847.059-467.125 0-847.059-379.934-847.059-847.059 0-267.106 126.607-515.915 338.824-675.727v393.374h112.94V112.941H0v112.941h342.89C127.058 407.38 0 674.711 0 960c0 529.355 430.645 960 960 960s960-430.645 960-960S1489.355 0 960 0"
                  fill-rule="evenodd" />
          </svg>
        </button>
      </div>

    </section>
  </main>

  <!-- JS principal -->
  <script src="js/app.js" defer></script>
</body>

</html>

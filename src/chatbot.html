<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Masclet Bot Fallero</title>
  <meta name="description" content="Masclet Bot Fallero: chatbot standalone sobre las Fallas de Valencia." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/chatbot.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js" defer></script>
  <script src="https://unpkg.com/compromise" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <main class="chatbot-frame">
    <section class="chatbot chatbot--static" aria-label="Chat con Masclet Bot" role="complementary">
      <div class="chatbot__header" role="banner">
        <div class="chatbot__avatar-wrapper">
          <picture class="chatbot__avatar-picture">
            <source srcset="img/masclet.avif" type="image/avif" />
            <source srcset="img/masclet.webp" type="image/webp" />
            <img class="chatbot__avatar" src="img/masclet.png" alt="Masclet Bot avatar" />
          </picture>
          <span class="chatbot__status-indicator" aria-hidden="true"></span>
        </div>
        <span class="chatbot__title">Masclet Bot</span>
        <div class="chatbot__language">
          <label class="sr-only" for="chat-language">Idioma del chat</label>
          <select class="chatbot__language-select" id="chat-language" aria-label="Idioma del chat">
            <option value="es">ES</option>
            <option value="va">VA</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
          </select>
        </div>
      </div>

      <div class="chatbot__body"
           role="log"
           aria-live="polite"
           aria-label="Mensajes del chat">
      </div>

      <div class="suggestions" aria-label="Sugerencias"></div>

      <div class="input-area">
        <label for="chat-input" class="sr-only">Escribe tu pregunta</label>
        <input class="input-area__field"
               id="chat-input"
               placeholder="Escribe tu pregunta..."
               type="text"
               autocomplete="off" />
        <button class="input-area__send" type="button" aria-label="Enviar mensaje">
          <i data-lucide="send" width="18" height="18"></i>
        </button>
        <button class="input-area__reset"
                type="button"
                title="Reiniciar conversación"
                aria-label="Reiniciar conversación">
          <i data-lucide="rotate-ccw" width="18" height="18"></i>
        </button>
      </div>
    </section>
  </main>

  <script src="js/app.js" defer></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
